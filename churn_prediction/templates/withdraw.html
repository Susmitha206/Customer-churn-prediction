{% extends "base.html" %}
{% block title %}Withdraw — ChurnBank{% endblock %}
{% block content %}
<div class="container">
<div class="card" style="max-width:480px">
  <div class="card-title">🏧 Withdraw Money</div>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <p style="font-size:13px;color:#64748b;margin-bottom:14px">Available Balance: <b style="color:#1d4ed8">₹{{ '{:,.2f}'.format(user.balance) }}</b></p>
  <form method="POST">
    <div class="form-group"><label>Amount (₹)</label><input class="form-control" type="number" name="amount" placeholder="Enter amount" min="1" step="0.01" required/></div>
    <div class="form-group"><label>Method</label>
      <select class="form-control" name="method"><option>ATM</option><option>Counter Cash</option><option>UPI</option><option>Online</option></select>
    </div>
    <div class="form-group"><label>Note (optional)</label><input class="form-control" name="note" placeholder="Reason for withdrawal"/></div>
    <button class="btn btn-danger btn-full" type="submit" style="padding:12px;font-size:15px">Withdraw</button>
  </form>
</div>
</div>
{% endblock %}
