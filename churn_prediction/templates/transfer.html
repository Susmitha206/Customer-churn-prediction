{% extends "base.html" %}
{% block title %}Transfer — ChurnBank{% endblock %}
{% block content %}
<div class="container">
<div class="card" style="max-width:520px">
  <div class="card-title">↔ Fund Transfer</div>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <p style="font-size:13px;color:#64748b;margin-bottom:14px">Available: <b style="color:#1d4ed8">₹{{ '{:,.2f}'.format(user.balance) }}</b></p>
  <form method="POST">
    <div class="form-group"><label>Recipient Account No.</label><input class="form-control" name="recipient_acc" placeholder="10-digit account number" required/></div>
    <div class="form-group"><label>Recipient Name</label><input class="form-control" name="recipient_name" placeholder="Beneficiary name" required/></div>
    <div class="form-group"><label>IFSC Code</label><input class="form-control" name="ifsc" placeholder="e.g. HDFC0001234" required/></div>
    <div class="form-row">
      <div class="form-group"><label>Amount (₹)</label><input class="form-control" type="number" name="amount" placeholder="Amount" min="1" step="0.01" required/></div>
      <div class="form-group"><label>Transfer Type</label>
        <select class="form-control" name="transfer_type"><option>NEFT</option><option>RTGS</option><option>IMPS</option><option>UPI</option></select>
      </div>
    </div>
    <div class="form-group"><label>Remarks</label><input class="form-control" name="remarks" placeholder="Optional remarks"/></div>
    <button class="btn btn-success btn-full" type="submit" style="padding:12px;font-size:15px">Transfer Funds</button>
  </form>
</div>
</div>
{% endblock %}
