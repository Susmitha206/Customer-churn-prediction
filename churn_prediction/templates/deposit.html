{% extends "base.html" %}
{% block title %}Deposit — ChurnBank{% endblock %}
{% block content %}
<div class="container">
<div class="card" style="max-width:480px">
  <div class="card-title">💰 Deposit Money</div>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <p style="font-size:13px;color:#64748b;margin-bottom:14px">Current Balance: <b style="color:#16a34a">₹{{ '{:,.2f}'.format(user.balance) }}</b></p>
  <form method="POST">
    <div class="form-group"><label>Amount (₹)</label><input class="form-control" type="number" name="amount" placeholder="Enter amount" min="1" step="0.01" required/></div>
    <div class="form-group"><label>Source</label>
      <select class="form-control" name="source"><option>Cash</option><option>UPI</option><option>NEFT/RTGS</option><option>Cheque</option><option>Online Transfer</option></select>
    </div>
    <div class="form-group"><label>Note (optional)</label><input class="form-control" name="note" placeholder="e.g. Salary, rent received..."/></div>
    <button class="btn btn-primary btn-full" type="submit" style="padding:12px;font-size:15px">Deposit Money</button>
  </form>
</div>
</div>
{% endblock %}
