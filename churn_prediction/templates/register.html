{% extends "base.html" %}
{% block title %}Register — ChurnBank{% endblock %}
{% block content %}
<div class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <div class="icon">🏦</div>
    <h1>Create Account</h1>
    <p>Join ChurnBank — Banking + Churn Intelligence</p>
  </div>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input class="form-control" name="first_name" placeholder="John" required/></div>
      <div class="form-group"><label>Last Name</label><input class="form-control" name="last_name" placeholder="Doe" required/></div>
    </div>
    <div class="form-group"><label>Email Address</label><input class="form-control" type="email" name="email" placeholder="john@email.com" required/></div>
    <div class="form-group"><label>Phone Number</label><input class="form-control" name="phone" placeholder="+91 9000000000" required/></div>
    <div class="form-row">
      <div class="form-group"><label>Date of Birth</label><input class="form-control" type="date" name="dob" required/></div>
      <div class="form-group"><label>Gender</label>
        <select class="form-control" name="gender">
          <option value="Male">Male</option><option value="Female">Female</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>City</label>
        <select class="form-control" name="geography">
          <option>Hyderabad</option><option>Mumbai</option><option>Delhi</option><option>Bangalore</option><option>Chennai</option>
        </select>
      </div>
      <div class="form-group"><label>Account Type</label>
        <select class="form-control" name="account_type">
          <option>Savings</option><option>Current</option><option>Salary</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Password</label><input class="form-control" type="password" name="password" placeholder="Minimum 6 characters" required/></div>
    <div class="form-group"><label>Confirm Password</label><input class="form-control" type="password" name="confirm_password" placeholder="Repeat password" required/></div>
    <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px;padding:12px;font-size:15px">Create Account</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">Already have an account? <a href="/login">Sign in</a></p>
</div>
</div>
{% endblock %}
